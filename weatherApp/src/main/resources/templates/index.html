<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Weather App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            min-height: 100vh;
            color: white;
        }

        .card-custom {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            width: 350px;
        }

        .btn-custom {
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            border: none;
            color: white;
        }

        .form-control {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #ddd;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="card-custom text-center">

        <!-- ✅ TITLE -->
        <h2 class="mb-3">🌤 Weather App</h2>

        <!-- ✅ DEFAULT TEXT (PREVENT BLANK PAGE) -->
        <p>Enter a city to check weather 🌍</p>

        <!-- ✅ FORM -->
        <form action="/weather" method="post">
            <input type="text" name="city" class="form-control mb-3" placeholder="Enter city" required>
            <button type="submit" class="btn btn-custom w-100">Search</button>
        </form>

        <!-- ❌ ERROR MESSAGE -->
        <div class="alert alert-danger mt-3" th:if="${error}">
            <span th:text="${error}"></span>
        </div>

        <!-- ✅ WEATHER RESULT -->
        <div class="mt-4" th:if="${weather != null}">
            <h3 th:text="${weather.city}"></h3>
            <h4 th:text="${weather.temperature} + ' °C'"></h4>
            <p th:text="${weather.condition}"></p>
        </div>

    </div>

</div>

</body>
</html>
