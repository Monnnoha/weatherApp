<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Weather App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            min-height: 100vh;
            color: white;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .form-control {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .btn-custom {
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            border: none;
            color: white;
            font-weight: bold;
        }

        .btn-custom:hover {
            opacity: 0.9;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="weather-card text-center">

        <h2 class="mb-4">🌤 Weather App</h2>

        <!-- Form -->
        <form action="/weather" method="post">
            <input type="text" name="city" class="form-control mb-3" placeholder="Enter city" required>

            <button type="submit" class="btn btn-custom w-100">Search</button>
        </form>

        <!-- Result -->
        <div class="result-box" th:if="${weather != null}">
            <h3 th:text="${weather.city}"></h3>
            <h4 th:text="${weather.temperature} + ' °C'"></h4>
            <p th:text="${weather.condition}"></p>
        </div>

    </div>

</div>

</body>
</html>
